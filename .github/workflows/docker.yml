name: Docker

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  DATABASE_URL: postgresql://jigit:jigit@localhost:5432/jigit
  REDIS_URL: redis://localhost:6379
  APP_ENCRYPTION_KEY: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
  MAX_CONCURRENT_AGENTS: "3"
  MAX_RETRIES: "3"
  APPROVAL_TIMEOUT_MS: "1800000"
  ANTHROPIC_API_KEY: ci-placeholder
  TELEGRAM_BOT_TOKEN: ci-placeholder
  PUBLIC_BASE_URL: http://localhost:3000
  API_PORT: "3000"
  API_WEBHOOK_SECRET: ci-secret
  DASHBOARD_API_TOKEN: ci-dashboard-token

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: jigit
          POSTGRES_PASSWORD: jigit
          POSTGRES_DB: jigit
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U jigit -d jigit"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run database migrations
        run: pnpm --filter @jigit/shared exec prisma migrate deploy

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

  docker:
    name: Docker (${{ matrix.image }})
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: api
            dockerfile: packages/api/Dockerfile
          - image: dashboard
            dockerfile: packages/dashboard/Dockerfile
          - image: worker
            dockerfile: packages/worker/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/${{ matrix.image }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
